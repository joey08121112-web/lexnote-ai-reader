services:
  - type: web
    name: lexnote
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    nodeVersion: 20
    envVars:
      - key: NODE_ENV
        value: production
      - key: NO_PROXY
        value: '*'
      - key: http_proxy
        value: ''
      - key: https_proxy
        value: ''
      - key: HTTP_PROXY
        value: ''
      - key: HTTPS_PROXY
        value: ''
      - key: ALL_PROXY
        value: ''
